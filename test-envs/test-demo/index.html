<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Demo</title>
</head>
<body class="p-5">

    <h4 class="mb-4">Button</h4>
    <div class="d-flex gap-2 flex-wrap mb-5">
        <elm-button label="Primary" btn-style="btn-primary"></elm-button>
        <elm-button label="Secondary" btn-style="btn-secondary"></elm-button>
        <elm-button label="Success" btn-style="btn-success"></elm-button>
        <elm-button label="Danger" btn-style="btn-danger"></elm-button>
        <elm-button label="With Icon" btn-style="btn-primary" icon="fa-solid fa-check"></elm-button>
        <elm-button label="Disabled" btn-style="btn-primary" disabled></elm-button>
    </div>

    <h4 class="mb-4">Dropdown</h4>
    <div class="d-flex gap-2 flex-wrap">
        <elm-dropdown label="Actions" btn-style="btn-primary">
            <elm-dropdown-item label="Edit" href="#"></elm-dropdown-item>
            <elm-dropdown-item label="Duplicate" href="#"></elm-dropdown-item>
            <elm-dropdown-item divider></elm-dropdown-item>
            <elm-dropdown-item label="Delete" href="#"></elm-dropdown-item>
        </elm-dropdown>

        <elm-dropdown label="Options" btn-style="btn-outline-secondary" align="end">
            <elm-dropdown-item label="Settings" href="#"></elm-dropdown-item>
            <elm-dropdown-item label="Help" href="#"></elm-dropdown-item>
        </elm-dropdown>
    </div>

    <script type="module">
        import { Button, Dropdown } from '../../dist/elementary-ui.es.js';
    </script>
</body>
</html>
